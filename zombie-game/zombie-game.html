<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masacre Zombi con KAPLAY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #contenedorJuego {
            position: relative;
        }
        #lienzoJuego {
            border: 4px solid #e94560;
            border-radius: 8px;
            cursor: crosshair;
        }
        #interfaz {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none; /* Para no bloquear clics del juego */
        }
        #interfaz span {
            margin-right: 20px;
        }
        #finDeJuego {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e94560;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 6px #000;
            text-align: center;
            display: none;
            z-index: 10;
        }
        #finDeJuego button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #finDeJuego button:hover {
            background: #ff6b6b;
        }
        #pantallaInicio {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
        }
        #pantallaInicio h1 {
            font-size: 64px;
            color: #e94560;
            text-shadow: 3px 3px 6px #000;
            margin-bottom: 20px;
        }
        #pantallaInicio p {
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }
        #pantallaInicio button {
            padding: 20px 50px;
            font-size: 24px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #pantallaInicio button:hover {
            background: #ff6b6b;
        }
    </style>
</head>
<body>
    <div id="contenedorJuego">
        <canvas id="lienzoJuego" width="800" height="600"></canvas>
        <div id="interfaz">
            <span>🧟 Puntos: <b id="puntos">0</b></span>
            <span>❤️ Vida: <b id="salud">100</b></span>
            <span>🌊 Oleada: <b id="oleada">1</b></span>
        </div>
        <div id="finDeJuego">
            <div>💀 FIN DEL JUEGO 💀</div>
            <div>Puntuación: <span id="puntuacionFinal">0</span></div>
            <button onclick="reiniciarJuego()">Jugar de Nuevo</button>
        </div>
        <div id="pantallaInicio">
            <h1>🧟 MASACRE ZOMBI 🧟</h1>
            <p>¡Mata a los zombis antes de que te alcancen!<br>Usa <b>WASD</b> o <b>flechas</b> para moverte y el <b>ratón</b> para apuntar y disparar.</p>
            <button onclick="iniciarJuego()">▶ JUGAR</button>
        </div>
    </div>

    <!-- Cargar KAPLAY (El fork de Kaboom.js) -->
    <script src="https://unpkg.com/kaplay/dist/kaplay.js"></script>
    <script>
        // Inicializar Kaplay vinculándolo al canvas existente del DOM
        kaplay({
            canvas: document.getElementById('lienzoJuego'),
            background: [22, 33, 62], // #16213e
            width: 800,
            height: 600,
            global: true     // Inyecta funciones en el scope global como kaboom
        });

        // Variables de estado mapeadas con la interfaz
        let puntuacionActual = 0;
        let saludActual = 100;
        let oleadaActual = 1;

        function actualizarInterfaz() {
            document.getElementById('puntos').textContent = puntuacionActual;
            document.getElementById('salud').textContent = Math.max(0, saludActual);
            document.getElementById('oleada').textContent = oleadaActual;
        }

        // Función para estrellas de fondo espaciales
        function crearEstrellas() {
            for (let i = 0; i < 50; i++) {
                add([
                    circle(1),
                    pos(rand(0, width()), rand(0, height())),
                    color(255, 255, 255),
                    opacity(rand(0.1, 0.3)),
                    "estrella"
                ]);
            }
        }

        // Función reutilizable para crear sangre (partículas físicas simples)
        function crearSangre(p) {
            for (let i = 0; i < 15; i++) {
                add([
                    pos(p.x, p.y),
                    circle(rand(3, 8)),
                    color(139, 0, 0),
                    anchor("center"),
                    opacity(1),
                    lifespan(1, { fade: 0.5 }),
                    {
                        vx: rand(-400, 400),
                        vy: rand(-400, 400),
                        update() {
                            this.pos.x += this.vx * dt();
                            this.pos.y += this.vy * dt();
                            this.vx *= Math.pow(0.95, dt() * 60); 
                            this.vy *= Math.pow(0.95, dt() * 60);
                        }
                    }
                ]);
            }
        }

        // === ESCENA PRINCIPAL DEL JUEGO ===
        scene("juego", () => {
            crearEstrellas(); // Generamos el ambiente

            puntuacionActual = 0;
            saludActual = 100;
            oleadaActual = 1;
            actualizarInterfaz();

            let zombisAAparecer = 5;
            let zombisAparecidos = 0;

            // -- Jugador --
            const jugador = add([
                circle(25),
                pos(width() / 2, height() / 2),
                color(52, 152, 219),
                area(),
                anchor("center"),
                "jugador",
                { velocidad: 300 }
            ]);

            // Sistema de dibujo manual del arma y detalles del personaje
            jugador.onDraw(() => {
                const posicionRatonLocal = mousePos().sub(jugador.pos);
                
                // Arma apuntando hacia donde mira el usuario
                drawLine({
                    p1: vec2(0, 0),
                    p2: posicionRatonLocal,
                    width: 3,
                    color: rgb(41, 128, 185)
                });
                
                // Detalle encima del jugador (visor)
                drawCircle({
                    pos: vec2(0, -5),
                    radius: 5,
                    color: rgb(41, 128, 185)
                });
            });

            // Movilidad atada a KAPLAY
            onKeyDown("w", () => { if (saludActual > 0) jugador.move(0, -jugador.velocidad); });
            onKeyDown("s", () => { if (saludActual > 0) jugador.move(0, jugador.velocidad); });
            onKeyDown("a", () => { if (saludActual > 0) jugador.move(-jugador.velocidad, 0); });
            onKeyDown("d", () => { if (saludActual > 0) jugador.move(jugador.velocidad, 0); });
            onKeyDown("up", () => { if (saludActual > 0) jugador.move(0, -jugador.velocidad); });
            onKeyDown("down", () => { if (saludActual > 0) jugador.move(0, jugador.velocidad); });
            onKeyDown("left", () => { if (saludActual > 0) jugador.move(-jugador.velocidad, 0); });
            onKeyDown("right", () => { if (saludActual > 0) jugador.move(jugador.velocidad, 0); });

            // Delimita el jugador a la pantalla
            jugador.onUpdate(() => {
                if (jugador.pos.x < 25) jugador.pos.x = 25;
                if (jugador.pos.y < 25) jugador.pos.y = 25;
                if (jugador.pos.x > width() - 25) jugador.pos.x = width() - 25;
                if (jugador.pos.y > height() - 25) jugador.pos.y = height() - 25;
            });

            // Acción Disparar
            onClick(() => {
                if (saludActual <= 0) return;
                
                const dir = mousePos().sub(jugador.pos).unit();
                
                // Efecto de cañonazo
                add([
                    pos(jugador.pos),
                    circle(rand(3, 7)),
                    color(255, 255, 0),
                    anchor("center"),
                    opacity(1),
                    lifespan(1, { fade: 0.5 }),
                    {
                        vx: dir.x * rand(100, 300) + rand(-100, 100),
                        vy: dir.y * rand(100, 300) + rand(-100, 100),
                        update() {
                            this.pos.x += this.vx * dt();
                            this.pos.y += this.vy * dt();
                            this.vx *= Math.pow(0.95, dt() * 60); 
                            this.vy *= Math.pow(0.95, dt() * 60);
                        }
                    }
                ]);

                // Generar Bala
                add([
                    pos(jugador.pos),
                    circle(6),
                    color(255, 255, 0),
                    area(),
                    anchor("center"),
                    move(dir, 900),
                    offscreen({ destroy: true }),
                    "bala"
                ]);
            });

            // -- Enemigos Zombi --
            function aparecerZombi() {
                const lado = Math.floor(rand(0, 4));
                let x, y;

                if (lado === 0) { x = rand(0, width()); y = -50; }
                else if (lado === 1) { x = width() + 50; y = rand(0, height()); }
                else if (lado === 2) { x = rand(0, width()); y = height() + 50; }
                else { x = -50; y = rand(0, height()); }

                const tamano = rand(40, 60);
                const saludBase = 2 + Math.floor(oleadaActual / 3);

                add([
                    circle(tamano / 2),
                    pos(x, y),
                    color(74, 124, 89),
                    area(),
                    anchor("center"),
                    "zombi",
                    {
                        saludMaxima: saludBase,
                        puntosDeSalud: saludBase,
                        velocidad: 30 + rand(0, 18) + oleadaActual * 3,
                        temporizadorGolpe: 0,
                        tamanoZ: tamano
                    }
                ]);
            }

            // Temporizador continuo para lanzar la oleada
            loop(1, () => {
                if (zombisAparecidos < zombisAAparecer) {
                    aparecerZombi();
                    zombisAparecidos++;
                }
            });

            // Monitorear y subir la oleada
            onUpdate(() => {
                if (zombisAparecidos === zombisAAparecer && get("zombi").length === 0) {
                    oleadaActual++;
                    zombisAAparecer = 5 + oleadaActual * 3;
                    zombisAparecidos = 0;
                    saludActual = Math.min(100, saludActual + 20);
                    actualizarInterfaz();
                }
            });

            // Lógica Zombi: Seguir al jugador y colorear
            onUpdate("zombi", (z) => {
                const dir = jugador.pos.sub(z.pos).unit();
                z.move(dir.scale(z.velocidad));

                if (z.temporizadorGolpe > 0) {
                    z.temporizadorGolpe -= dt();
                    z.color = rgb(255, 255, 255); // Destello de daño activo
                } else {
                    z.color = rgb(74, 124, 89);
                }

                // Intersección con el personaje manualmente para mejor control del ritmo:
                if (jugador.pos.dist(z.pos) < 25 + z.tamanoZ / 2) {
                    saludActual -= 10;
                    z.destroy();
                    crearSangre(jugador.pos);
                    actualizarInterfaz();

                    if (saludActual <= 0) {
                        terminarJuego();
                    }
                }
            });

            // Recrear detalles gráficos del zombi (barra de vida, forma, etc.)
            onDraw("zombi", (z) => {
                const colorOjo = z.temporizadorGolpe > 0 ? rgb(255, 0, 0) : rgb(45, 74, 62);
                drawCircle({ pos: vec2(-8, -5), radius: 6, color: colorOjo });
                drawCircle({ pos: vec2(8, -5), radius: 6, color: colorOjo });

                drawCircle({ pos: vec2(-8, -5), radius: 3, color: rgb(26, 26, 46) });
                drawCircle({ pos: vec2(8, -5), radius: 3, color: rgb(26, 26, 46) });

                drawRect({
                    pos: vec2(-10, 8),
                    width: 20,
                    height: 6,
                    color: rgb(139, 0, 0)
                });

                drawRect({
                    pos: vec2(-3, 15),
                    width: 6,
                    height: 15,
                    color: rgb(51, 51, 51)
                });

                // Trazar barra de vida del zombi flotante
                const porcentajeSalud = z.puntosDeSalud / z.saludMaxima;
                const posicionYSalud = -z.tamanoZ / 2 - 10;
                
                drawRect({ pos: vec2(-z.tamanoZ / 2, posicionYSalud), width: z.tamanoZ, height: 5, color: rgb(51, 51, 51) });

                let colorSalud = rgb(0, 255, 0);
                if (porcentajeSalud <= 0.25) colorSalud = rgb(255, 0, 0);
                else if (porcentajeSalud <= 0.5) colorSalud = rgb(255, 255, 0);
                
                drawRect({ pos: vec2(-z.tamanoZ / 2, posicionYSalud), width: z.tamanoZ * porcentajeSalud, height: 5, color: colorSalud });
            });

            // Detección de Colisión Bala -> Zombi
            onCollide("bala", "zombi", (b, z) => {
                if (b.haColisionado === z.id) return; 
                b.haColisionado = z.id;
                
                b.destroy();
                z.puntosDeSalud--;
                z.temporizadorGolpe = 0.1;

                if (z.puntosDeSalud <= 0) {
                    crearSangre(z.pos);
                    z.destroy();
                    puntuacionActual += 10;
                    actualizarInterfaz();
                }
            });
        });

        // === ESCENAS DE MENÚS SECUNDARIAS ===
        scene("inicio", () => {
            crearEstrellas();
        });

        scene("finDelJuego", () => {
            crearEstrellas();
        });

        // Iniciar suspendido a la espera del botón JUGAR en el html
        go("inicio");

        // === EVENTOS DEL DOM ===
        window.iniciarJuego = () => {
            document.getElementById('pantallaInicio').style.display = 'none';
            document.getElementById('finDeJuego').style.display = 'none';
            go("juego");
        };

        window.reiniciarJuego = () => {
            window.iniciarJuego();
        };

        function terminarJuego() {
            document.getElementById('puntuacionFinal').textContent = puntuacionActual;
            document.getElementById('finDeJuego').style.display = 'block';
            go("finDelJuego"); // Corta la ejecución de la partida
        }
    </script>
</body>
</html>
