<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Massacre con KAPLAY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #e94560;
            border-radius: 8px;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none; /* Para no bloquear clics del juego */
        }
        #ui span {
            margin-right: 20px;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e94560;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 6px #000;
            text-align: center;
            display: none;
            z-index: 10;
        }
        #gameOver button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #gameOver button:hover {
            background: #ff6b6b;
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
        }
        #startScreen h1 {
            font-size: 64px;
            color: #e94560;
            text-shadow: 3px 3px 6px #000;
            margin-bottom: 20px;
        }
        #startScreen p {
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }
        #startScreen button {
            padding: 20px 50px;
            font-size: 24px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #startScreen button:hover {
            background: #ff6b6b;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <span>🧟 Puntos: <b id="score">0</b></span>
            <span>❤️ Vida: <b id="health">100</b></span>
            <span>🌊 Oleada: <b id="wave">1</b></span>
        </div>
        <div id="gameOver">
            <div>💀 GAME OVER 💀</div>
            <div>Puntuación: <span id="finalScore">0</span></div>
            <button onclick="restartGame()">Jugar de Nuevo</button>
        </div>
        <div id="startScreen">
            <h1>🧟 ZOMBIE MASSACRE 🧟</h1>
            <p>¡Mata a los zombies antes de que te alcancen!<br>Usa <b>WASD</b> o <b>flechas</b> para moverte y el <b>mouse</b> para apuntar y disparar.</p>
            <button onclick="startGame()">▶ JUGAR</button>
        </div>
    </div>

    <!-- Cargar KAPLAY (El fork de Kaboom.js) -->
    <script src="https://unpkg.com/kaplay/dist/kaplay.js"></script>
    <script>
        // Inicializar Kaplay vinculándolo al canvas existente del DOM
        kaplay({
            canvas: document.getElementById('gameCanvas'),
            background: [22, 33, 62], // #16213e
            width: 800,
            height: 600,
            global: true     // Inyecta funciones en el scope global como kaboom
        });

        // Variables de estado mapeadas con el UI
        let currentScore = 0;
        let currentHealth = 100;
        let currentWave = 1;

        function updateUI() {
            document.getElementById('score').textContent = currentScore;
            document.getElementById('health').textContent = Math.max(0, currentHealth);
            document.getElementById('wave').textContent = currentWave;
        }

        // Función para estrellas de fondo espaciales
        function createStars() {
            for (let i = 0; i < 50; i++) {
                add([
                    circle(1),
                    pos(rand(0, width()), rand(0, height())),
                    color(255, 255, 255),
                    opacity(rand(0.1, 0.3)),
                    "star"
                ]);
            }
        }

        // Función reutilizable para crear sangre (partículas físicas simples)
        function createBlood(p) {
            for (let i = 0; i < 15; i++) {
                add([
                    pos(p.x, p.y),
                    circle(rand(3, 8)),
                    color(139, 0, 0),
                    anchor("center"),
                    opacity(1),
                    lifespan(1, { fade: 0.5 }),
                    {
                        vx: rand(-400, 400),
                        vy: rand(-400, 400),
                        update() {
                            this.pos.x += this.vx * dt();
                            this.pos.y += this.vy * dt();
                            this.vx *= Math.pow(0.95, dt() * 60); 
                            this.vy *= Math.pow(0.95, dt() * 60);
                        }
                    }
                ]);
            }
        }

        // === ESCENA PRINCIPAL DEL JUEGO ===
        scene("game", () => {
            createStars(); // Generamos el ambiente

            currentScore = 0;
            currentHealth = 100;
            currentWave = 1;
            updateUI();

            let zombiesToSpawn = 5;
            let zombiesSpawned = 0;

            // -- Jugador --
            const player = add([
                circle(25),
                pos(width() / 2, height() / 2),
                color(52, 152, 219),
                area(),
                anchor("center"),
                "player",
                { speed: 300 }
            ]);

            // Sistema de dibujo manual del arma y detalles del personaje
            player.onDraw(() => {
                const mousePosLocal = mousePos().sub(player.pos);
                
                // Arma apuntando hacia donde mira el usuario
                drawLine({
                    p1: vec2(0, 0),
                    p2: mousePosLocal,
                    width: 3,
                    color: rgb(41, 128, 185)
                });
                
                // Detalle encima del jugador (visor)
                drawCircle({
                    pos: vec2(0, -5),
                    radius: 5,
                    color: rgb(41, 128, 185)
                });
            });

            // Movilidad atada a KAPLAY
            onKeyDown("w", () => { if (currentHealth > 0) player.move(0, -player.speed); });
            onKeyDown("s", () => { if (currentHealth > 0) player.move(0, player.speed); });
            onKeyDown("a", () => { if (currentHealth > 0) player.move(-player.speed, 0); });
            onKeyDown("d", () => { if (currentHealth > 0) player.move(player.speed, 0); });
            onKeyDown("up", () => { if (currentHealth > 0) player.move(0, -player.speed); });
            onKeyDown("down", () => { if (currentHealth > 0) player.move(0, player.speed); });
            onKeyDown("left", () => { if (currentHealth > 0) player.move(-player.speed, 0); });
            onKeyDown("right", () => { if (currentHealth > 0) player.move(player.speed, 0); });

            // Delimita el jugador a la pantalla
            player.onUpdate(() => {
                if (player.pos.x < 25) player.pos.x = 25;
                if (player.pos.y < 25) player.pos.y = 25;
                if (player.pos.x > width() - 25) player.pos.x = width() - 25;
                if (player.pos.y > height() - 25) player.pos.y = height() - 25;
            });

            // Acción Disparar
            onClick(() => {
                if (currentHealth <= 0) return;
                
                const dir = mousePos().sub(player.pos).unit();
                
                // Efecto de cañónazo
                add([
                    pos(player.pos),
                    circle(rand(3, 7)),
                    color(255, 255, 0),
                    anchor("center"),
                    opacity(1),
                    lifespan(1, { fade: 0.5 }),
                    {
                        vx: dir.x * rand(100, 300) + rand(-100, 100),
                        vy: dir.y * rand(100, 300) + rand(-100, 100),
                        update() {
                            this.pos.x += this.vx * dt();
                            this.pos.y += this.vy * dt();
                            this.vx *= Math.pow(0.95, dt() * 60); 
                            this.vy *= Math.pow(0.95, dt() * 60);
                        }
                    }
                ]);

                // Generar Bala
                add([
                    pos(player.pos),
                    circle(6),
                    color(255, 255, 0),
                    area(),
                    anchor("center"),
                    move(dir, 900),
                    offscreen({ destroy: true }),
                    "bullet"
                ]);
            });

            // -- Enemigos Zombie --
            function spawnZombie() {
                const side = Math.floor(rand(0, 4));
                let x, y;

                if (side === 0) { x = rand(0, width()); y = -50; }
                else if (side === 1) { x = width() + 50; y = rand(0, height()); }
                else if (side === 2) { x = rand(0, width()); y = height() + 50; }
                else { x = -50; y = rand(0, height()); }

                const size = rand(40, 60);
                const baseHealth = 2 + Math.floor(currentWave / 3);

                add([
                    circle(size / 2),
                    pos(x, y),
                    color(74, 124, 89),
                    area(),
                    anchor("center"),
                    "zombie",
                    {
                        maxHealth: baseHealth,
                        hp: baseHealth,
                        speed: 30 + rand(0, 18) + currentWave * 3,
                        hitTimer: 0,
                        zSize: size
                    }
                ]);
            }

            // Temporizador continuo para lanzar la oleada
            loop(1, () => {
                if (zombiesSpawned < zombiesToSpawn) {
                    spawnZombie();
                    zombiesSpawned++;
                }
            });

            // Monitorear y subir la oleada
            onUpdate(() => {
                if (zombiesSpawned === zombiesToSpawn && get("zombie").length === 0) {
                    currentWave++;
                    zombiesToSpawn = 5 + currentWave * 3;
                    zombiesSpawned = 0;
                    currentHealth = Math.min(100, currentHealth + 20);
                    updateUI();
                }
            });

            // Lógica Zombie: Seguir al jugador y colorear
            onUpdate("zombie", (z) => {
                const dir = player.pos.sub(z.pos).unit();
                z.move(dir.scale(z.speed));

                if (z.hitTimer > 0) {
                    z.hitTimer -= dt();
                    z.color = rgb(255, 255, 255); // Flash de daño activo
                } else {
                    z.color = rgb(74, 124, 89);
                }

                // Intersección con el personaje manualmente para mejor control del timing:
                if (player.pos.dist(z.pos) < 25 + z.zSize / 2) {
                    currentHealth -= 10;
                    z.destroy();
                    createBlood(player.pos);
                    updateUI();

                    if (currentHealth <= 0) {
                        endGame();
                    }
                }
            });

            // Recrear detalles gráficos del zombie (barra de vida, forma, etc.)
            onDraw("zombie", (z) => {
                const eyeColor = z.hitTimer > 0 ? rgb(255, 0, 0) : rgb(45, 74, 62);
                drawCircle({ pos: vec2(-8, -5), radius: 6, color: eyeColor });
                drawCircle({ pos: vec2(8, -5), radius: 6, color: eyeColor });

                drawCircle({ pos: vec2(-8, -5), radius: 3, color: rgb(26, 26, 46) });
                drawCircle({ pos: vec2(8, -5), radius: 3, color: rgb(26, 26, 46) });

                drawRect({
                    pos: vec2(-10, 8),
                    width: 20,
                    height: 6,
                    color: rgb(139, 0, 0)
                });

                drawRect({
                    pos: vec2(-3, 15),
                    width: 6,
                    height: 15,
                    color: rgb(51, 51, 51)
                });

                // Trazar barra de vida zombie flotante
                const hpPercent = z.hp / z.maxHealth;
                const hpY = -z.zSize / 2 - 10;
                
                drawRect({ pos: vec2(-z.zSize / 2, hpY), width: z.zSize, height: 5, color: rgb(51, 51, 51) });

                let hpColor = rgb(0, 255, 0);
                if (hpPercent <= 0.25) hpColor = rgb(255, 0, 0);
                else if (hpPercent <= 0.5) hpColor = rgb(255, 255, 0);
                
                drawRect({ pos: vec2(-z.zSize / 2, hpY), width: z.zSize * hpPercent, height: 5, color: hpColor });
            });

            // Detección de Colisión Bala -> Zombie
            onCollide("bullet", "zombie", (b, z) => {
                if (b.hasCollided === z.id) return; 
                b.hasCollided = z.id;
                
                b.destroy();
                z.hp--;
                z.hitTimer = 0.1;

                if (z.hp <= 0) {
                    createBlood(z.pos);
                    z.destroy();
                    currentScore += 10;
                    updateUI();
                }
            });
        });

        // === ESCENAS DE MENÚS SECUNDARIAS ===
        scene("start", () => {
            createStars();
        });

        scene("gameover", () => {
            createStars();
        });

        // Iniciar suspendido a la espera del botón JUGAR en el html
        go("start");

        // === EVENTOS DEL DOM ===
        window.startGame = () => {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            go("game");
        };

        window.restartGame = () => {
            window.startGame();
        };

        function endGame() {
            document.getElementById('finalScore').textContent = currentScore;
            document.getElementById('gameOver').style.display = 'block';
            go("gameover"); // Corta la ejecución de la partida
        }
    </script>
</body>
</html>
